<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404) — GarutVON</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/landing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Sticky Navigation -->
    <header class="sticky-nav">
        <div class="container nav-container">
            <a href="/" class="logo">GarutVON <span>v2</span></a>
        </div>
    </header>

    <section class="hero-wrapper"
        style="display: flex; align-items: center; justify-content: center; min-height: 90vh;">
        <div class="grid-bg"></div>
        <div class="container" style="max-width: 500px; text-align: center;">
            <div class="card" style="padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.75);">
                <div style="font-size: 48px; margin-bottom: 24px;"><i class="fa-solid fa-magnifying-glass"
                        aria-hidden="true"></i></div>
                <h1 class="text-gradient" style="font-size: 32px; font-weight: 800; margin-bottom: 12px;">404 — Lost in
                    Space</h1>
                <p style="color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 24px;">
                    We searched across our entire cloud network but could not find the file directory or page you
                    requested. It may have been moved, renamed, or purged.
                </p>
                <a href="/" class="btn btn-primary" style="width: 100%;">Return to Safety</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container footer-bottom">
            <p>&copy; 2026 GarutVON Inc. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/js/components.js"></script>
</body>

</html>
