<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — GarutVON</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/landing.css">
    <link rel="stylesheet" href="/css/threedee.css">
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Securing access portal</div>
    </div>

    <!-- Sticky Navigation -->
    <header class="sticky-nav">
        <div class="container nav-container">
            <a href="/" class="logo">GarutVON <span>v2</span></a>
            <div class="nav-actions">
                <a href="/login" class="btn btn-secondary btn-sm">Login</a>
            </div>
        </div>
    </header>

    <!-- Content Wrapper -->
    <section class="hero-wrapper" style="display: flex; align-items: center; justify-content: center; min-height: 90vh;">
        <div class="grid-bg"></div>
        <div class="container" style="max-width: 440px;">
            <div class="card hover-depth-card" style="padding: 40px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75);">
                <div style="text-align: center; margin-bottom: 32px;">
                    <h2 class="text-gradient" style="font-size: 28px; font-weight: 800;">Reset Password</h2>
                    <p style="color: var(--text-secondary); font-size: 14px; margin-top: 6px;">Provide your registration email to recover access.</p>
                </div>

                <form id="forgot-password-form">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input class="form-control" type="email" id="email" placeholder="you@domain.com" required>
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 12px;">Send Instructions</button>
                </form>

                <p style="text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 24px;">
                    Remember your password? <a href="/login" style="color: var(--text-primary); font-weight: 600;">Log In</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="/js/components.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
