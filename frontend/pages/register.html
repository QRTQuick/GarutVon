<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — GarutVON</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/landing.css">
    <link rel="stylesheet" href="/css/threedee.css">
</head>

<body>

    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Starting Registration Console</div>
    </div>

    <!-- Sticky Navigation -->
    <header class="sticky-nav">
        <div class="container nav-container">
            <a href="/" class="logo">GarutVON <span>v2</span></a>
            <div class="nav-actions">
                <a href="/login" class="btn btn-primary btn-sm">Login</a>
            </div>
        </div>
    </header>

    <!-- Content Wrapper -->
    <section class="hero-wrapper"
        style="display: flex; align-items: center; justify-content: center; min-height: 90vh;">
        <div class="grid-bg"></div>
        <div class="threedee-scene">
            <div class="wireframe-cube cube-1"></div>
            <div class="wireframe-cube cube-2"></div>
        </div>
        <div class="container" style="max-width: 440px;">
            <div class="card hover-depth-card" style="padding: 40px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75);">
                <div style="text-align: center; margin-bottom: 32px;">
                    <h2 class="text-gradient" style="font-size: 28px; font-weight: 800;">Get Started</h2>
                    <p style="color: var(--text-secondary); font-size: 14px; margin-top: 6px;">Create your free
                        development profile instantly.</p>
                </div>

                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label" for="full_name">Full Name</label>
                        <input class="form-control" type="text" id="full_name" placeholder="E.g. Chisom Life" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input class="form-control" type="email" id="email" placeholder="you@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" type="password" id="password" placeholder="At least 8 characters"
                            required>
                    </div>
                    <div class="password-strength">
                        <span class="password-strength-label">Strength: <strong id="password-strength-status">Very
                                weak</strong></span>
                        <div class="password-strength-meter">
                            <div id="password-strength-bar"></div>
                        </div>
                    </div>
                    <div class="form-group flex align-center" style="gap: 8px;">
                        <input type="checkbox" id="terms_agree" style="accent-color: #fff; width: 14px; height: 14px;"
                            required>
                        <label for="terms_agree"
                            style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">
                            I agree to the <a href="/terms" target="_blank"
                                style="color: var(--text-primary); text-decoration: underline;">Terms of Service</a> &
                            <a href="/privacy" target="_blank"
                                style="color: var(--text-primary); text-decoration: underline;">Privacy Policy</a>.
                        </label>
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 12px;">Create
                        Account</button>
                </form>

                <p style="text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 24px;">
                    Already have an account? <a href="/login" style="color: var(--text-primary); font-weight: 600;">Log
                        In</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="/js/components.js"></script>
    <script src="/js/threedee.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
