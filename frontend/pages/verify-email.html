<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification — GarutVON</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/landing.css">
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Verifying Email Address</div>
    </div>

    <!-- Sticky Navigation -->
    <header class="sticky-nav">
        <div class="container nav-container">
            <a href="/" class="logo">GarutVON <span>v2</span></a>
        </div>
    </header>

    <!-- Content Wrapper -->
    <section class="hero-wrapper" style="display: flex; align-items: center; justify-content: center; min-height: 90vh;">
        <div class="grid-bg"></div>
        <div class="container" style="max-width: 480px;">
            <div class="card hover-depth-card" style="padding: 40px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75); text-align: center;">
                <div style="font-size: 48px; margin-bottom: 24px;">📧</div>
                <h2 class="text-gradient" style="font-size: 28px; font-weight: 800; margin-bottom: 12px;">Email Verification</h2>
                
                <p id="verification-status" style="font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px;">
                    Verifying your email address context on our cryptographic cluster. Please stand by...
                </p>

                <div style="margin-top: 24px;">
                    <a href="/login" class="btn btn-secondary">Go to Login Portal</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="/js/components.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Automatically launch email verification trigger after loading
            triggerEmailVerification();
        });
    </script>
</body>
</html>
