<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — GarutVON</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/landing.css">
</head>

<body>

    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Securing accounts</div>
    </div>

    <!-- Sticky Navigation -->
    <header class="sticky-nav">
        <div class="container nav-container">
            <a href="/" class="logo">GarutVON <span>v2</span></a>
        </div>
    </header>

    <!-- Content Wrapper -->
    <section class="hero-wrapper"
        style="display: flex; align-items: center; justify-content: center; min-height: 90vh;">
        <div class="grid-bg"></div>
        <div class="container" style="max-width: 440px;">
            <div class="card hover-depth-card" style="padding: 40px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.75);">
                <div style="text-align: center; margin-bottom: 32px;">
                    <h2 class="text-gradient" style="font-size: 28px; font-weight: 800;">New Password</h2>
                    <p style="color: var(--text-secondary); font-size: 14px; margin-top: 6px;">Set up a robust password
                        to secure your credentials.</p>
                </div>

                <form id="reset-password-form">
                    <div class="form-group">
                        <label class="form-label" for="password">New Password</label>
                        <input class="form-control" type="password" id="password" required
                            placeholder="Min 8 characters">
                    </div>
                    <div class="password-strength">
                        <span class="password-strength-label">Strength: <strong id="reset-password-strength-status">Very
                                weak</strong></span>
                        <div class="password-strength-meter">
                            <div id="reset-password-strength-bar"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirm New Password</label>
                        <input class="form-control" type="password" id="confirm_password" required
                            placeholder="Re-type password">
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 12px;">Save
                        Password</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="/js/components.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
