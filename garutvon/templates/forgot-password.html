{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="auth-art" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
    </div>
    <div class="auth-copy">
        <p class="eyebrow">Reset Access</p>
        <h1>Forgot Password</h1>
        <p>Enter your email and we will send a reset link if your account exists.</p>
    </div>
    <form class="form glass auth-form" method="post" data-auth-form>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Email<input name="email" type="email" autocomplete="email" required></label>
        <p class="auth-note"><i class="fa-solid fa-shield-halved"></i> We will not share your address publicly.</p>
        <button class="button" type="submit"><i class="fa-solid fa-envelope"></i> Send reset link</button>
        <div class="auth-actions">
            <a href="/login">Back to login</a>
            <a href="/register">Create an account</a>
        </div>
    </form>
</section>
{% endblock %}
