{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="auth-art" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
    </div>
    <div class="auth-copy">
        <p class="eyebrow">Reset Your Password</p>
        <h1>Create a New Password</h1>
        <p>Enter a new secure password. This link will expire for security reasons.</p>
    </div>
    <form class="form glass auth-form" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="token" value="{{ token }}">
        <label>New password
            <span class="password-row"><input name="new_password" type="password" minlength="10"
                    autocomplete="new-password" required data-password-input><button class="icon-button" type="button"
                    data-toggle-password aria-label="Show password"><i class="fa-solid fa-eye"></i></button></span>
        </label>
        <label>Confirm password<input name="confirm_password" type="password" autocomplete="new-password" required
                data-confirm-password></label>
        <button class="button" type="submit"><i class="fa-solid fa-key"></i> Set new password</button>
        <div class="auth-actions">
            <a href="/login">Back to login</a>
        </div>
    </form>
</section>
{% endblock %}
