name: Build Desktop Packages

on:
  push:
    branches: [ 'packaging' ]

env:
  REPO_OWNER: QRTQuick
  REPO_NAME: GarutVon
  PACKAGE_BASE: garutvon

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install PyOxidizer
        run: python -m pip install --upgrade pip pyoxidizer
      - name: Build (linux)
        run: |
          pyoxidizer build --release --target-triple x86_64-unknown-linux-gnu
      - name: Archive linux artifact
        run: |
          mkdir -p release-artifacts
          tar -C build/x86_64-unknown-linux-gnu/release/exe -czf release-artifacts/${{ env.PACKAGE_BASE }}-linux-x86_64.tar.gz . || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: release-artifacts/${{ env.PACKAGE_BASE }}-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install PyOxidizer
        run: python -m pip install --upgrade pip pyoxidizer
      - name: Build (windows)
        run: pyoxidizer build --release --target-triple x86_64-pc-windows-msvc
      - name: Zip windows artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path release-artifacts -Force | Out-Null
          $out = "build\\x86_64-pc-windows-msvc\\release\\exe\\*"
          Compress-Archive -Path $out -DestinationPath release-artifacts\${{ env.PACKAGE_BASE }}-windows-x86_64.zip -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: release-artifacts/${{ env.PACKAGE_BASE }}-windows-x86_64.zip

  build-macos:
    name: Build macOS (x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install PyOxidizer
        run: python -m pip install --upgrade pip pyoxidizer
      - name: Build (macos)
        run: pyoxidizer build --release --target-triple x86_64-apple-darwin
      - name: Archive macos artifact
        run: |
          mkdir -p release-artifacts
          tar -C build/x86_64-apple-darwin/release/exe -czf release-artifacts/${{ env.PACKAGE_BASE }}-macos-x86_64.tar.gz . || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: release-artifacts/${{ env.PACKAGE_BASE }}-macos-x86_64.tar.gz

  publish-release:
    name: Create Release and attach artifacts
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: release-artifacts
      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: release-artifacts
      - name: Download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact
          path: release-artifacts
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          release_name: GarutVON Desktop build-${{ github.run_number }}
          body: Release built desktop binaries for GarutVON
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload linux asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/${{ env.PACKAGE_BASE }}-linux-x86_64.tar.gz
          asset_name: ${{ env.PACKAGE_BASE }}-linux-x86_64.tar.gz
          asset_content_type: application/gzip
      - name: Upload windows asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/${{ env.PACKAGE_BASE }}-windows-x86_64.zip
          asset_name: ${{ env.PACKAGE_BASE }}-windows-x86_64.zip
          asset_content_type: application/zip
      - name: Upload macos asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/${{ env.PACKAGE_BASE }}-macos-x86_64.tar.gz
          asset_name: ${{ env.PACKAGE_BASE }}-macos-x86_64.tar.gz
          asset_content_type: application/gzip
